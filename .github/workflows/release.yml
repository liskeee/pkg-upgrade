name: Release

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      force:
        description: "Force a release even without releasable commits"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/pkg-upgrade/
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release tooling
        run: python -m pip install "python-semantic-release==9.*" build

      - name: Run semantic-release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            semantic-release version --patch
          else
            semantic-release version
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      - name: Upload wheel to release
        if: hashFiles('dist/*.whl') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release upload "$TAG" dist/*.whl --clobber

      - name: Publish to PyPI
        if: hashFiles('dist/*') != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
